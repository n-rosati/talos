apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-operator
  namespace: nvidia-operator
spec:
  interval: 2m
  chart:
    spec:
      chart: gpu-operator
      version: 26.3.1
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    driver:
      enabled: false
    toolkit:
      enabled: false
    hostPaths:
      driverInsallDir: /usr/local
    devicePlugin:
      config:
        name: time-slicing-config
        default: any
