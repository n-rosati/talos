apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lvm-disk-watcher
  namespace: lvm-disk-watcher
spec:
  interval: 5m
  releaseName: lvm-disk-watcher
  chart:
    spec:
      chart: lvm-disk-watcher
      version: 5.1.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/trueforge-org/lvm-disk-watcher
      tag: 1.1.0@sha256:882a94e4bc554349644fbf62eda89baa103411cdda8312ed31672607b401fae2
    configmap:
      disk-config:
        enabled: true
        data:
          disk-config: |
            k8s-control-1: /dev/sda
