apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lvm-disk-watcher
  namespace: lvm-disk-watcher
spec:
  interval: 5m
  releaseName: lvm-disk-watcher
  chart:
    spec:
      chart: lvm-disk-watcher
      version: 5.2.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/trueforge-org/lvm-disk-watcher
      tag: 1.1.0@sha256:531d22fd97fd7086ef6854c232f45d61c9e0e1b8e91f8c6bf1207b8648d8aab2
    configmap:
      disk-config:
        enabled: true
        data:
          disk-config: |
            k8s-control-1: /dev/sda
