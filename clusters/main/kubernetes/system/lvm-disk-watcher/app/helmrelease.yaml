apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lvm-disk-watcher
  namespace: lvm-disk-watcher
spec:
  interval: 5m
  releaseName: lvm-disk-watcher
  chart:
    spec:
      chart: lvm-disk-watcher
      version: 5.1.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/trueforge-org/lvm-disk-watcher
      tag: 1.1.0@sha256:c90e5ccbc1b54e843f13b1833d3b82f2c7e4280d4eb459b4441f31ea0097f6eb
    configmap:
      disk-config:
        enabled: true
        data:
          disk-config: |
            k8s-control-1: /dev/sda
