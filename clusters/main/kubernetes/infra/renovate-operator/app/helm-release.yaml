apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
  namespace: renovate-operator
spec:
  interval: 2m
  chart:
    spec:
      chart: renovate-operator
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: mogenius
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: le-prod
        cert-manager.io/private-key-rotation-policy: Always
        # Adds auth
        nginx.ingress.kubernetes.io/auth-method: "GET"
        nginx.ingress.kubernetes.io/auth-url: "http://${AUTHELIA_INTERNAL_DNS}/api/verify"
        nginx.ingress.kubernetes.io/auth-signin: "https://auth.${DOMAIN_0}?rm=$request_method"
        nginx.ingress.kubernetes.io/auth-response-headers: "Remote-User,Remote-Name,Remote-Groups,Remote-Email"
      ingressClassName: external
      host: renovate.${DOMAIN_0}
      tls:
        - secretName: renovate-operator-tls-0
          hosts:
            - renovate.${DOMAIN_0}
    webhook:
      enabled: true
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: le-prod
          cert-manager.io/private-key-rotation-policy: Always
        ingressClassName: external
        host: renovate-webhook.${DOMAIN_0}
        tls:
          - secretName: renovate-operator-webhook-tls-0
            hosts:
              - renovate-webhook.${DOMAIN_0}
    valkey:
      enabled: true
      auth:
        enabled: false
      dataStorage:
        enabled: true
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      dashboard:
        enabled: true
