apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: statech-industry
  namespace: mc-statech-industry
spec:
  interval: 2m
  timeout: 10m
  chart:
    spec:
      chart: minecraft-java
      version: 35.0.6
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    TZ: America/Toronto
    global:
      stopAll: true
    mcBackupImage:
      repository: docker.io/itzg/mc-backup
      tag: 2026.3.2@sha256:5d2c1fb80f4a225927e6ff05305d915ee2866bc320dd999f23373360cf88bd40
      pullPolicy: Always
    credentials:
      home-s3:
        name: home-s3
        type: s3
        url: ${S3_URL}
        bucket: statech-industry
        encrKey: ${BACKUP_ENCRYPTION_KEY}
        accessKey: ${S3_ACCESS_KEY}
        secretKey: ${S3_SECRET_KEY}
    service:
      main:
        enabled: true
        type: LoadBalancer
        annotations:
          mc-router.itzg.me/externalServerName: "statech-industry.${DOMAIN_0}"
      rcon:
        enabled: true
        type: LoadBalancer
    persistence:
      data:
        targetSelector:
          main:
            main:
              mountPath: /data
            mcbackup:
              mountPath: /data
              readOnly: true
        volsync:
          - credentials: home-s3
            name: home-s3
            type: restic
            dest:
              enabled: true
            src:
              enabled: true
              trigger:
                schedule: 35 5 * * *
      backups:
        enabled: true
        type: nfs
        path: ${NFS_BULK_DATA}/Backups/Minecraft/statech-industry
        server: ${TRUENAS_IP}
        targetSelector:
          main:
            mcbackup:
              mountPath: /backups
    mcbackup:
      zstd_params:
        - --long=25
        - --single-thread
      excludes:
        - "*.jar"
        - "cache"
        - "logs"
        - "*.tmp"
    workload:
      main:
        podSpec:
          containers:
            main:
              imageSelector: j17Image
              env:
                OPS: Hydranoid620,b227
                WHITELIST: Hydranoid620,b227
                ENABLE_COMMAND_BLOCK: true
                VERSION: 1.19.2
                TYPE: CURSEFORGE
                CF_SERVER_MOD: https://mediafilez.forgecdn.net/files/4708/101/StaTech+1.1.11+Server+Files.zip
                MAX_PLAYERS: 2
                MOTD: Welcome to StaTech Industry!
                PVP: true
                MEMORY: "4G"
                RCON_PASSWORD: ${MC_RCON_PASSWORD}
                FTB_LEGACYJAVAFIXER: false
                USE_MODPACK_START_SCRIPT: true
                SEED: "-5088804881017501598"
                FORCE_REDOWNLOAD: false
                USE_FLARE_FLAGS: false
                USE_AIKAR_FLAGS: true
                USE_SIMD_FLAGS: true
                ALLOW_FLIGHT: true
                STOP_SERVER_ANNOUNCE_DELAY: 15
                STOP_DURATION: 40
            mcbackup:
              enabled: true
              imageSelector: mcBackupImage
              probes:
                liveness:
                  enabled: false
                readiness:
                  enabled: false
                startup:
                  enabled: false
              env:
                BACKUP_METHOD: "tar"
                DEST_DIR: "{{.Values.persistence.backups.targetSelector.main.mcbackup.mountPath }}"
                SRC_DIR: "{{.Values.persistence.data.mountPath }}"
                SERVER_PORT: "{{ .Values.service.main.ports.main.port }}"
                RCON_HOST: '{{ printf "%s-rcon" (include "tc.v1.common.lib.chart.names.fullname" $) }}'
                RCON_PORT: "{{ .Values.service.rcon.ports.rcon.port }}"
                RCON_PASSWORD: "{{ .Values.workload.main.podSpec.containers.main.env.RCON_PASSWORD }}"
                SERVER_HOST: '{{ include "tc.v1.common.lib.chart.names.fullname" $ }}'
                ZSTD_PARAMETERS: '{{ join " " .Values.mcbackup.zstd_params }}'
                EXCLUDES: '{{ join "," .Values.mcbackup.excludes }}'
                BACKUP_INTERVAL: "4h"
                INITIAL_DELAY: "2m"
                LINK_LATEST: "false"
                PAUSE_IF_NO_PLAYERS: "true"
                PLAYERS_ONLINE_CHECK_INTERVAL: "1m"
                PRUNE_BACKUPS_DAYS: "4"
                TAR_COMPRESS_METHOD: "zstd"
    resources:
      requests:
        cpu: 100m
        memory: 8Gi
      limits:
        cpu: null
        memory: 10Gi
