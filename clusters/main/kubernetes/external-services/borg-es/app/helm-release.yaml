apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: borgui-es
  namespace: borg-es
spec:
  interval: 2m
  chart:
    spec:
      chart: external-service
      version: 17.2.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    service:
      main:
        type: ExternalIP
        externalIP: ${TRUENAS_IP}
        ports:
          main:
            protocol: http
            port: 30406
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: borgui.${DOMAIN_0}
        integrations:
          certManager:
            enabled: true
            certificateIssuer: le-prod
          nginx:
            enabled: true
            auth:
              type: authelia
              internalHost: ${AUTHELIA_INTERNAL_DNS}
              externalHost: ${AUTHELIA_EXTERNAL_DNS}
          # homepage:
          #   enabled: true
          #   name: TrueNAS
          #   description: " "
          #   group: Infrastructure
          #   icon: truenas.png
          #   widget:
          #     enabled: true
          #     type: truenas
          #     url: https://{{ .Values.service.main.externalIP }}
          #     custom:
          #       key: ${HOMEPAGE_TRUENAS_KEY}
---
